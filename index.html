<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6b3a" />
  <title>Potager Fontlaure</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🥕 Potager Fontlaure</h1>
    <span id="sync-indicator" class="sync-indicator" title="Statut de synchronisation"></span>
  </header>

  <main id="main">
    <!-- Tableau de bord -->
    <section id="view-dashboard" class="view" data-view="dashboard">
      <div class="period-switch">
        <button data-period="week" class="active">Semaine</button>
        <button data-period="month">Mois</button>
        <button data-period="year">Année</button>
      </div>
      <div class="period-nav">
        <button id="period-prev">◀</button>
        <span id="period-label"></span>
        <button id="period-next">▶</button>
      </div>
      <div id="dashboard-stats"></div>
      <h2>Clients (historique complet)</h2>
      <div id="customer-stats"></div>
    </section>

    <!-- Ramassage -->
    <section id="view-ramassage" class="view" data-view="ramassage" hidden>
      <form id="form-harvest" class="card-form">
        <h2>Nouveau ramassage</h2>
        <label>Article
          <select id="harvest-item" required></select>
        </label>
        <label>Quantité
          <input id="harvest-qty" type="number" step="0.01" min="0" required />
        </label>
        <label>Date
          <input id="harvest-date" type="date" required />
        </label>
        <label>Contributeur
          <select id="harvest-contributor" required></select>
        </label>
        <label>Note (optionnel)
          <input id="harvest-note" type="text" />
        </label>
        <button type="submit">Enregistrer</button>
      </form>
      <h2>Derniers ramassages</h2>
      <ul id="harvest-list" class="entry-list"></ul>
    </section>

    <!-- Vente -->
    <section id="view-vente" class="view" data-view="vente" hidden>
      <form id="form-sale" class="card-form">
        <h2>Nouvelle vente</h2>
        <label>Article
          <select id="sale-item" required></select>
        </label>
        <label>Quantité
          <input id="sale-qty" type="number" step="0.01" min="0" required />
        </label>
        <div class="sale-info">
          <span>Prix : <strong id="sale-price-display">–</strong></span>
          <span>Stock dispo : <strong id="sale-stock-display">–</strong></span>
        </div>
        <input id="sale-price" type="hidden" />
        <label>Date
          <input id="sale-date" type="date" required />
        </label>
        <label>Contributeur
          <select id="sale-contributor" required></select>
        </label>
        <label>Acheteur (optionnel)
          <input id="sale-buyer" type="text" />
        </label>
        <button type="submit">Enregistrer</button>
      </form>
      <h2>Dernières ventes</h2>
      <ul id="sale-list" class="entry-list"></ul>
    </section>

    <!-- Articles -->
    <section id="view-articles" class="view" data-view="articles" hidden>
      <form id="form-item" class="card-form">
        <h2>Nouvel article</h2>
        <label>Nom
          <input id="item-name" type="text" required />
        </label>
        <label>Catégorie
          <select id="item-category" required></select>
        </label>
        <label>Unité (kg, pièce, botte...)
          <input id="item-unit" type="text" required value="kg" />
        </label>
        <label>Prix (€)
          <input id="item-price" type="number" step="0.01" min="0" required />
        </label>
        <button type="submit">Ajouter</button>
      </form>
      <h2>Articles existants</h2>
      <ul id="item-list" class="entry-list"></ul>
    </section>

    <!-- Réglages -->
    <section id="view-reglages" class="view" data-view="reglages" hidden>
      <div class="card-form">
        <h2>Contributeurs</h2>
        <label>Contributeur 1
          <input id="contrib-1" type="text" />
        </label>
        <label>Contributeur 2
          <input id="contrib-2" type="text" />
        </label>
        <button id="save-contributors">Enregistrer</button>
      </div>

      <div class="card-form">
        <h2>Sauvegarde locale (JSON)</h2>
        <button id="export-json">Exporter</button>
        <label class="file-label">Importer
          <input id="import-json" type="file" accept="application/json" />
        </label>
      </div>

      <div class="card-form">
        <h2>Synchronisation GitHub</h2>
        <label>Token d'accès personnel (PAT)
          <input id="gh-pat" type="password" autocomplete="off" />
        </label>
        <label>Propriétaire (owner)
          <input id="gh-owner" type="text" placeholder="ex: yorian" />
        </label>
        <label>Dépôt (repo)
          <input id="gh-repo" type="text" placeholder="ex: PotagerFontlaure" />
        </label>
        <label>Chemin du fichier
          <input id="gh-path" type="text" value="data.json" />
        </label>
        <label>Branche
          <input id="gh-branch" type="text" value="main" />
        </label>
        <div class="btn-row">
          <button id="save-sync-settings">Enregistrer</button>
          <button id="sync-now">Synchroniser maintenant</button>
        </div>
        <p id="sync-status" class="sync-status"></p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button data-view="dashboard" class="active">📊<span>Bilan</span></button>
    <button data-view="ramassage">🧺<span>Ramassage</span></button>
    <button data-view="vente">💶<span>Vente</span></button>
    <button data-view="articles">🌱<span>Articles</span></button>
    <button data-view="reglages">⚙️<span>Réglages</span></button>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
